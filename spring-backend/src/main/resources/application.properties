spring.application.name=diabetes-backend
server.port=8080

#Vercel configaration
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# OAuth2 client configuration (Google)
spring.security.oauth2.client.registration.google.client-id=720850204385-a6hcf50vrcitmbnltqhvjpbu9pebvvn8.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.redirect-uri=${SPRING_BASE_URL}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=email,profile

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://glucopal-peach.vercel.app

cors.allowed-methods=GET,POST,PUT,DELETE
cors.allowed-headers=*
cors.allow-credentials=true

# Application-specific properties
jwt.secret=${JWT_SECRET:your-super-secret-key-at-least-32-characters-long}
jwt.expiration=900000

# Python service
python.ai.service.url=${PYTHON_SERVICE_URL:http://localhost:8000}

#Python AI microservice URL
python.ai.service.url=http://localhost:8000

#Logging
logging.level.com.diabetesapp=DEBUG



